<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LyraCode — Proyecto Final</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/courses.css">
  <link rel="stylesheet" href="/css/project.css">

  <!-- CodeMirror CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
</head>
<body>
  <div id="particles-container"></div>

  <!-- Main Layout Wrapper -->
  <div class="dashboard-wrapper">

    <!-- Left Sidebar (Same unifed sidebar design!) -->
    <aside class="left-sidebar">
      <div class="sidebar-logo" onclick="window.location.href='/'">
        <div class="creeper-logo-icon"></div>
        <span class="logo-title">LyraCode</span>
      </div>

      <nav class="sidebar-menu">
        <a href="/courses" class="menu-item" id="nav-courses">
          <span class="menu-icon icon-house-pixel"></span>
          <span>Inicio</span>
        </a>
        <a href="/rutas" class="menu-item active" id="nav-routes">
          <span class="menu-icon icon-map-pixel"></span>
          <span>Rutas</span>
        </a>
        <a href="/misiones" class="menu-item" id="nav-missions">
          <span class="menu-icon icon-sword-pixel"></span>
          <span>Misiones</span>
        </a>
        <a href="/perfil" class="menu-item" id="nav-profile">
          <span class="menu-icon icon-gear-pixel"></span>
          <span>Ajustes</span>
        </a>
      </nav>

      <!-- Daily Streak Sidebar Panel -->
      <div class="streak-panel">
        <div class="streak-header">
          <strong>Racha diaria 🔥</strong>
        </div>
        <div class="streak-days">4 días</div>
        <div class="streak-progress">
          <div class="streak-block active"></div>
          <div class="streak-block active"></div>
          <div class="streak-block active"></div>
          <div class="streak-block"></div>
          <div class="streak-chest"></div>
        </div>
        <span class="streak-footer">¡Sigue así!</span>
      </div>
    </aside>

    <!-- Main Content Panel Area -->
    <div class="main-content">
      
      <!-- Top Stats Header -->
      <header class="top-stats-header">
        <div class="stats-right">
          <div class="stat-item">
            <span class="icon icon-coin"></span>
            <span id="stat-coins">0</span>
          </div>
          <div class="stat-item">
            <span class="icon icon-gem"></span>
            <span id="stat-gems">0</span>
          </div>
          <div class="stat-item user-level-stat">
            <span class="level-badge" id="stat-level">Nivel 1</span>
            <div class="xp-bar-container">
              <div class="xp-bar-fill" id="stat-xp-bar"></div>
            </div>
            <span id="stat-xp">0 XP</span>
          </div>
          <img class="navbar-avatar" id="stat-avatar" src="" alt="Avatar" title="Cerrar Sesión" onclick="logout()">
        </div>
      </header>

      <!-- Content Grid -->
      <main class="dashboard-grid">
        
        <!-- Breadcrumb Navigation -->
        <nav class="breadcrumb-nav">
          <a href="/courses">Rutas</a> <span class="breadcrumb-separator">&gt;</span> 
          <a href="" id="breadcrumb-course-link">HTML</a> <span class="breadcrumb-separator">&gt;</span> 
          <span class="active-crumb">Proyecto Final</span>
        </nav>

        <div class="project-workspace-layout fade-in">
          <!-- Left Column Panel: Requirements Checklist -->
          <div class="workspace-sidebar-panel">
            <div class="req-checklist-box mc-panel">
              <h3 class="panel-subtitle" style="font-family: var(--font-pixel); font-size: 8px; margin-bottom: 15px; border-bottom: 1.5px solid #1b2d3d; padding-bottom: 10px; color: #ffffff;">REQUISITOS</h3>
              <ul class="req-checklist" id="req-checklist">
                <!-- Loaded dynamically -->
              </ul>
            </div>

            <div class="rewards-widget mc-panel" style="margin-top: 20px;">
              <h3 class="panel-title" style="margin: 0 0 16px 0; border-bottom: 1.5px solid #1b2d3d; padding-bottom: 10px; font-size: 14px;">RECOMPENSA</h3>
              <div class="reward-row" style="display: flex; align-items: center; gap: 12px; background-color: rgba(7, 17, 29, 0.4); padding: 10px; border-radius: 8px; border: 1.5px solid #1b2d3d; margin-bottom: 8px; font-family: var(--font-pixel); font-size: 8px; color: #ffffff;">
                <span class="icon icon-coin"></span>
                <span id="reward-coins">+100 Monedas</span>
              </div>
              <div class="reward-row" style="display: flex; align-items: center; gap: 12px; background-color: rgba(7, 17, 29, 0.4); padding: 10px; border-radius: 8px; border: 1.5px solid #1b2d3d; margin-bottom: 8px; font-family: var(--font-pixel); font-size: 8px; color: #ffffff;">
                <span class="icon icon-gem" style="background-color: transparent;"></span>
                <span id="reward-xp">+500 XP</span>
              </div>
            </div>
          </div>

          <!-- Project Workspace Area (keep class workspace-panel for JS selectors) -->
          <div class="workspace-editor-panel mc-panel workspace-panel">
            <div class="workspace-header">
              <h2 id="project-title" style="font-family: var(--font-body); font-size: 20px; font-weight: bold; color: #ffffff; margin: 0;">Proyecto Final</h2>
              <span class="badge gold">Desafío</span>
            </div>

            <p class="project-desc-intro" id="project-instructions" style="font-size: 14px; color: #b0b8c4; margin-bottom: 24px; line-height: 1.6;">Cargando detalles del proyecto...</p>

            <!-- Editor & Preview Grid -->
            <div class="code-grid">
              <!-- Editor -->
              <div class="editor-pane">
                <div class="pane-header">EDITA TU CÓDIGO</div>
                <div id="codemirror-wrapper"></div>
              </div>

              <!-- Live Preview -->
              <div class="preview-pane">
                <div class="pane-header">VISTA PREVIA</div>
                <div class="preview-container">
                  <iframe id="live-preview" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
              </div>
            </div>

            <!-- Feedback Boxes -->
            <div class="feedback-box error" id="feedback-error-box" style="display: none; padding: 14px 18px; font-size: 14px; border-radius: 8px; margin-bottom: 24px; font-weight: 500; background-color: rgba(239, 68, 68, 0.1); border: 1.5px solid #ef4444; color: #f87171;"></div>
            <div class="feedback-box success" id="feedback-success-box" style="display: none; padding: 14px 18px; font-size: 14px; border-radius: 8px; margin-bottom: 24px; font-weight: 500; background-color: rgba(16, 185, 129, 0.1); border: 1.5px solid #10b981; color: #34d399;">¡Proyecto validado con éxito!</div>

            <!-- Action bar -->
            <div class="workspace-actions-bar">
              <button class="mc-btn" onclick="goBackToCourse()">← Volver</button>
              <button class="mc-btn green" id="submit-project-btn" onclick="submitProjectCode()"><span class="icon-check-btn" style="margin-right: 6px;"></span>Enviar Proyecto</button>
            </div>
          </div>
        </div>

      </main>
    </div>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/particles.js"></script>
  <script src="/js/project.js"></script>
</body>
</html>
